name: '🚀 CI/CD Pipeline'

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: '🧪 Test & Lint'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    strategy:
      matrix:
        node-version: ['18.x', '20.x']
    
    steps:
      - name: '📋 Checkout code'
        uses: actions/checkout@v4.1.1

      - name: '📦 Setup Node.js'
        uses: actions/setup-node@v4.0.2
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: '⬇️ Install dependencies'
        run: npm install

      - name: '🔍 Lint code'
        run: npm run lint

      - name: '📘 Type checking'
        run: npm run type-check

      - name: '🧪 Run tests'
        run: npm run test

      - name: '📊 Generate coverage'
        run: npm run test:coverage
        continue-on-error: true

      - name: '📤 Upload coverage'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
        continue-on-error: true

  build:
    name: '🔨 Build'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    
    steps:
      - name: '📋 Checkout code'
        uses: actions/checkout@v4.1.1

      - name: '📦 Setup Node.js'
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 18.x
          cache: npm

      - name: '⬇️ Install dependencies'
        run: npm install

      - name: '🔨 Build project'
        run: npm run build

      - name: '📤 Upload build artifacts'
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/
          retention-days: 5
